<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin login</title><link rel="stylesheet" href="/admin/login/auth.css"></head><body><main class="card"><img src="/assets/logo.jpeg" alt=""><h1>Admin login</h1><p>Sign in to manage Balance & Restore.</p><form id="f"><label>Email<input id="e" type="email" required></label><label>Password<input id="p" type="password" required></label><button>Sign in</button></form><div id="m"></div><a href="/">Return to website</a></main><script>f.onsubmit=async x=>{x.preventDefault();m.textContent='Signing in…';const r=await fetch('/api/auth/login',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({email:e.value,password:p.value})});const d=await r.json();if(!r.ok){m.textContent=d.error;return}location.href='/admin/'};</script></body></html>
