<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Initial setup</title><link rel="stylesheet" href="/admin/login/auth.css"></head><body><main class="card"><img src="/assets/logo.jpeg" alt=""><h1>Initial setup</h1><p>This page works only before the first local user is created.</p><form id="f"><label>Setup token<input id="t" type="password" required></label><label>Admin email<input id="e" type="email" required></label><label>Full name<input id="n" required></label><label>Password<input id="p" type="password" minlength="12" required></label><button>Create administrator</button></form><div id="m"></div></main><script>f.onsubmit=async x=>{x.preventDefault();m.textContent='Creating…';const r=await fetch('/api/auth/setup',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({token:t.value,email:e.value,name:n.value,password:p.value})});const d=await r.json();if(!r.ok){m.textContent=d.error;return}location.href='/admin/login/'};</script></body></html>
