<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Balance & Restore Admin</title><link rel="stylesheet" href="/admin/admin.css"></head><body><header><div><strong>Balance & Restore</strong><span>Website Manager</span></div><div><span id="currentUser"></span><a href="/" target="_blank">View website ↗</a><button id="logout" type="button">Logout</button></div></header><div class="shell"><aside><button class="tab active" data-tab="dashboard">Dashboard</button><button class="tab" data-tab="general">General</button><button class="tab" data-tab="typography">Typography</button><button class="tab" data-tab="theme">Theme</button><button class="tab" data-tab="sections">Sections</button><button class="tab" data-tab="services">Services</button><button class="tab" data-tab="offer">Promotion</button><button class="tab" data-tab="about">About</button><button class="tab" data-tab="faq">FAQs</button><button class="tab" data-tab="testimonials">Testimonials</button><button class="tab" data-tab="contact">Contact</button><button class="tab" data-tab="policies">Policies</button><button class="tab" data-tab="seo">SEO</button><a class="users-link" href="/admin/users/">Users & passwords</a></aside><main><div id="status" class="status">Loading…</div><form id="editor">
<section class="panel active" data-panel="dashboard"><h1>Dashboard</h1><div id="summary" class="summary-grid"></div><div class="tip"><b>Safe editing:</b> required defaults are preserved automatically.</div></section>
<section class="panel" data-panel="general"><h1>General details</h1><div class="grid"><label>Business name<input name="businessName"></label><label>Qualifications<input name="qualification"></label><label class="full">Main tagline<textarea name="tagline"></textarea></label><label class="full">Introduction<textarea name="intro"></textarea></label><label>Location<input name="location"></label><label>Booking note<input name="bookingNote"></label><label class="full">Setmore URL<input name="bookingUrl" type="url"></label><label>Opening hours<input name="openingHours"></label></div></section>
<section class="panel" data-panel="typography"><h1>Typography</h1><div class="grid"><label>Main tagline size<input type="range" min="38" max="90" name="theme.heroTitleSize"><span class="range-output"></span></label><label>About heading size<input type="range" min="30" max="72" name="theme.aboutTitleSize"><span class="range-output"></span></label><label>Section headings<input type="range" min="28" max="64" name="theme.sectionTitleSize"><span class="range-output"></span></label><label>Body text size<input type="range" min="14" max="22" name="theme.bodySize"><span class="range-output"></span></label><label>Heading font<select name="theme.headingFont"><option>Cormorant Garamond</option><option>Georgia</option><option>Playfair Display</option></select></label><label>Body font<select name="theme.bodyFont"><option>Inter</option><option>Arial</option><option>Verdana</option></select></label></div></section>
<section class="panel" data-panel="theme"><h1>Theme</h1><div class="presets"><button type="button" data-preset="soft-feminine">Soft Feminine</button><button type="button" data-preset="olive-gold">Olive & Gold</button><button type="button" data-preset="rose-sage">Rose & Sage</button><button type="button" data-preset="modern-minimal">Modern Minimal</button></div><div class="grid"><label>Primary<input type="color" name="theme.primary"></label><label>Dark<input type="color" name="theme.primaryDark"></label><label>Accent<input type="color" name="theme.accent"></label><label>Soft blush<input type="color" name="theme.blush"></label><label>Background<input type="color" name="theme.background"></label><label>Section background<input type="color" name="theme.surface"></label><label>Alternate section<input type="color" name="theme.surfaceAlt"></label><label>Text<input type="color" name="theme.text"></label><label>Header<select name="theme.headerStyle"><option value="light">Light</option><option value="dark">Dark</option></select></label><label>Hero layout<select name="theme.heroLayout"><option value="split">Split</option><option value="center">Centred</option></select></label><label>Shadow<select name="theme.shadow"><option value="none">None</option><option value="soft">Soft</option><option value="strong">Strong</option></select></label><label>Section spacing<input type="number" name="theme.sectionSpacing"></label><label>Card roundness<input type="number" name="theme.cardRadius"></label><label>Button roundness<input type="number" name="theme.buttonRadius"></label><label>Logo size<input type="number" name="theme.logoSize"></label><label>Banner height<input type="number" name="theme.bannerHeight"></label></div></section>
<section class="panel" data-panel="sections"><h1>Section visibility</h1><div id="sectionControls"></div></section>
<section class="panel" data-panel="services"><div class="panel-heading"><h1>Services</h1><button type="button" id="addService">+ Add service</button></div><div id="services"></div></section>
<section class="panel" data-panel="offer"><h1>Promotion</h1><label class="switch"><input type="checkbox" name="offer.enabled"> Enabled</label><label>Title<input name="offer.title"></label><label>Details<textarea name="offer.text"></textarea></label><div class="grid"><label>Button text<input name="offer.buttonText"></label><label>Start date<input type="date" name="offer.startDate"></label><label>End date<input type="date" name="offer.endDate"></label></div></section>
<section class="panel" data-panel="about"><h1>About</h1><label>Small title<input name="about.eyebrow"></label><label>Main heading<input name="about.heading"></label><label>Text<textarea name="about.text"></textarea></label><div id="qualifications"></div><button type="button" id="addQualification">+ Add qualification</button></section>
<section class="panel" data-panel="faq"><div class="panel-heading"><h1>FAQs</h1><button type="button" id="addFaq">+ Add FAQ</button></div><div id="faqs"></div></section>
<section class="panel" data-panel="testimonials"><div class="panel-heading"><h1>Testimonials</h1><button type="button" id="addTestimonial">+ Add testimonial</button></div><div id="testimonials"></div></section>
<section class="panel" data-panel="contact"><h1>Contact</h1><div class="grid"><label>Email<input type="email" name="email"></label><label>WhatsApp URL<input type="url" name="whatsappUrl"></label><label>Instagram URL<input type="url" name="instagramUrl"></label><label>Facebook URL<input type="url" name="facebookUrl"></label></div></section>
<section class="panel" data-panel="policies"><h1>Policies</h1><label>Cancellation<textarea name="policies.cancellation"></textarea></label><label>Privacy<textarea name="policies.privacy"></textarea></label><label>Disclaimer<textarea name="policies.disclaimer"></textarea></label></section>
<section class="panel" data-panel="seo"><h1>SEO</h1><label>Page title<input name="seo.title"></label><label>Description<textarea name="seo.description"></textarea></label><label>Canonical URL<input name="seo.canonicalUrl" type="url"></label></section>
<div class="savebar"><button type="button" id="resetButton" class="secondary">Reset defaults</button><button type="button" id="discardButton" class="secondary">Discard changes</button><button type="submit">Save and publish</button></div></form></main></div><script src="/admin/admin.js"></script></body></html>
